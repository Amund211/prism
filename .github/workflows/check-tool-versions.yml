name: Check tool versions

permissions:
  contents: read

on:
  pull_request:
    paths:
      - pyproject.toml
      - uv.lock
      - .pre-commit-config.yaml
      - .github/workflows/check-tool-versions.yml
  push:
    branches:
      - main
    paths:
      - pyproject.toml
      - uv.lock
      - .pre-commit-config.yaml
      - .github/workflows/check-tool-versions.yml

jobs:
  check-versions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version-file: .python-version

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Install dependencies
        run: |
          uv sync

      - name: Check black version matches pre-commit config
        run: |
          UV_VERSION=$(uv run black --version | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -n1)
          PRECOMMIT_VERSION=$(grep -A1 'psf/black' .pre-commit-config.yaml | grep 'rev:' | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          echo "black version in uv: $UV_VERSION"
          echo "black version in .pre-commit-config.yaml: $PRECOMMIT_VERSION"
          if [ "$UV_VERSION" != "$PRECOMMIT_VERSION" ]; then
              echo "Error: black versions do not match!"
              exit 1
          fi
          echo "black versions match ✓"

      - name: Check isort version matches pre-commit config
        run: |
          UV_VERSION=$(uv run isort --version-number)
          PRECOMMIT_VERSION=$(grep -A1 'PyCQA/isort' .pre-commit-config.yaml | grep 'rev:' | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          echo "isort version in uv: $UV_VERSION"
          echo "isort version in .pre-commit-config.yaml: $PRECOMMIT_VERSION"
          if [ "$UV_VERSION" != "$PRECOMMIT_VERSION" ]; then
              echo "Error: isort versions do not match!"
              exit 1
          fi
          echo "isort versions match ✓"

      - name: Check flake8 version matches pre-commit config
        run: |
          UV_VERSION=$(uv run flake8 --version | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -n1)
          PRECOMMIT_VERSION=$(grep -A1 'PyCQA/flake8' .pre-commit-config.yaml | grep 'rev:' | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          echo "flake8 version in uv: $UV_VERSION"
          echo "flake8 version in .pre-commit-config.yaml: $PRECOMMIT_VERSION"
          if [ "$UV_VERSION" != "$PRECOMMIT_VERSION" ]; then
              echo "Error: flake8 versions do not match!"
              exit 1
          fi
          echo "flake8 versions match ✓"
